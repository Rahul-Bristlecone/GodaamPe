apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: sharma92/godaampe:latest
        envFrom:
        - configMapRef:
            name: frontend-configmap
        
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend
spec:
  type: ClusterIP   # nodeport (dev) or LoadBalancer if you’re on cloud
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
