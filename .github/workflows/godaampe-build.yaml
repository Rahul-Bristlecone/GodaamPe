name: Godaampe UI (Build and Package)
on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: The environment to deploy to (e.g., staging, production)
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm test

      - name: Build the application
        run: npm run build

      - name: Package the application
        run: npm pack

      - name: Store the packaged application as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: godaampe-UI-package
          path: |
              package*
          retention-days: 1

      - name: Proceed with deployment
        run: echo "Proceeding with deployment steps for ${{ github.event.inputs.environment || 'staging' }}..."