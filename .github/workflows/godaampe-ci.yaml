name: godaampe CI
on: 
  push:
    branches: [main]
  
jobs:
  # Keep Docker image name centralized so build/push use identical tags.
  # This avoids pushing to docker.io/library/godaampe, which is not writable.
  # Example resolved value: <docker-username>/godaampe:latest
  
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
      
      - name: Install dependencies
        run: npm ci --include=optional
      
      - name: Build the application
        run: npm run build

      - name: package the application (Github artifact)
        run: npm pack

  push-image:
    runs-on: ubuntu-latest
    needs: build-image
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/godaampe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push Docker image to Docker Hub
        run: docker push $IMAGE_NAME:latest
        